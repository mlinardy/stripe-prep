<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stripe 360° Business Map — Pricing Analyst Interview Prep</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #0a2540;
    --panel-bg: #ffffff;
    --accent: #635bff;
    --accent2: #00d4ff;
    --text: #0a2540;
    --muted: #6b7c93;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #0a2540 0%, #1a3a5c 100%);
    color: var(--text);
    overflow: hidden;
  }
  #header {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 14px 24px;
    color: white;
    z-index: 10;
    pointer-events: none;
  }
  #header h1 { margin: 0; font-size: 20px; font-weight: 700; }
  #header p { margin: 4px 0 0; font-size: 13px; color: #b8c4d9; }
  #legend {
    position: absolute;
    top: 14px; right: 24px;
    color: #b8c4d9;
    font-size: 12px;
    text-align: right;
    z-index: 10;
  }
  #legend span { display: inline-block; margin-left: 10px; }
  #legend .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:4px; vertical-align:middle; }

  #chart-container {
    width: 100%;
    height: 100vh;
    cursor: grab;
  }
  #chart-container:active { cursor: grabbing; }

  .link {
    fill: none;
    stroke: #4a6b94;
    stroke-opacity: 0.5;
    stroke-width: 1.5px;
  }
  .node circle {
    stroke-width: 2.5px;
    cursor: pointer;
    transition: r 0.15s ease;
  }
  .node:hover circle {
    stroke: var(--accent2);
  }
  .node text {
    font-size: 12px;
    fill: #e8eef7;
    pointer-events: none;
    paint-order: stroke;
    stroke: #0a2540;
    stroke-width: 3px;
    stroke-linejoin: round;
  }
  .node.root text { font-size: 16px; font-weight: 700; fill: #ffffff; }
  .node.selected circle { stroke: #ffd166 !important; stroke-width: 4px; }

  /* Detail panel */
  #panel {
    position: absolute;
    top: 0; right: 0;
    width: 380px;
    max-width: 90vw;
    height: 100vh;
    background: var(--panel-bg);
    box-shadow: -6px 0 24px rgba(0,0,0,0.25);
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 20;
    overflow-y: auto;
    padding: 24px;
  }
  #panel.open { transform: translateX(0); }
  #panel h2 {
    margin: 0 0 4px;
    font-size: 20px;
    color: var(--accent);
  }
  #panel .tag {
    display: inline-block;
    background: #f0eeff;
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 12px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #panel h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    margin: 18px 0 6px;
    border-bottom: 1px solid #e6e9f0;
    padding-bottom: 4px;
  }
  #panel ul { margin: 0; padding-left: 18px; }
  #panel li { margin-bottom: 6px; font-size: 13.5px; line-height: 1.5; }
  #panel .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    background: #f0eeff;
    border: none;
    border-radius: 50%;
    width: 28px; height: 28px;
    font-size: 16px;
    color: var(--accent);
    cursor: pointer;
  }
  #hint {
    position: absolute;
    bottom: 16px; left: 24px;
    color: #b8c4d9;
    font-size: 12px;
    z-index: 10;
    pointer-events: none;
  }
  #controls {
    position: absolute;
    bottom: 16px; right: 24px;
    z-index: 10;
  }
  #controls button {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
    margin-left: 6px;
  }
  #controls button:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div id="header">
  <h1>💳 Stripe — 360° Business Map</h1>
  <p>Pricing Analyst interview prep · Click any node to expand/collapse · Click a leaf (●) for pricing, revenue &amp; challenge notes</p>
</div>

<div id="legend">
  <span><i class="dot" style="background:#635bff"></i>Core / Company</span>
  <span><i class="dot" style="background:#00d4ff"></i>Product Line</span>
  <span><i class="dot" style="background:#ffd166"></i>Detail (click me)</span>
</div>

<div id="chart-container"></div>

<div id="panel">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <div id="panel-content"></div>
</div>

<div id="hint">Scroll to zoom · Drag to pan · Reset with the button →</div>
<div id="controls">
  <button onclick="resetView()">Reset View</button>
  <button onclick="expandAll()">Expand All</button>
  <button onclick="collapseAll()">Collapse All</button>
</div>

<script>
// ============================================================
// DATA — Stripe business map for Pricing Analyst interview prep
// Sources: Stripe 2024 Annual Letter, stripe.com/pricing,
// Connect/Tax/Radar pricing pages, 2025 market analyses.
// ============================================================

// ============================================================
// D3 RENDERING — collapsible radial-ish tree
// ============================================================
const colors = {
  root: "#635bff",
  line: "#00d4ff",
  detail: "#ffd166"
};

const container = document.getElementById("chart-container");
let width = container.clientWidth;
let height = container.clientHeight;

const svg = d3.select("#chart-container")
  .append("svg")
  .attr("width", "100%")
  .attr("height", "100%");

const g = svg.append("g");

const zoom = d3.zoom()
  .scaleExtent([0.2, 3])
  .on("zoom", (event) => g.attr("transform", event.transform));

svg.call(zoom);

// Tree layout (horizontal)
const treeLayout = d3.tree()
  .nodeSize([46, 240])
  .separation((a, b) => (a.parent === b.parent ? 1.1 : 1.6));

const root = d3.hierarchy(data);
root.x0 = height / 2;
root.y0 = 0;

// collapse third level (details) by default
root.children.forEach(child => {
  if (child.children) {
    child._children = child.children;
    child.children.forEach(c => {
      if (c.children) { c._children = c.children; c.children = null; }
    });
  }
});

let i = 0;

function update(source) {
  const treeData = treeLayout(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  // Normalize for fixed-depth spacing
  nodes.forEach(d => { d.y = d.depth * 260; });

  // ---- Links ----
  const link = g.selectAll("path.link")
    .data(links, d => d.target.id || (d.target.id = ++i));

  const linkEnter = link.enter().insert("path", "g")
    .attr("class", "link")
    .attr("d", d => diagonal(source, source));

  link.merge(linkEnter).transition().duration(300)
    .attr("d", d => diagonal(d.source, d.target));

  link.exit().transition().duration(300)
    .attr("d", d => diagonal(source, source))
    .remove();

  // ---- Nodes ----
  const node = g.selectAll("g.node")
    .data(nodes, d => d.id || (d.id = ++i));

  const nodeEnter = node.enter().append("g")
    .attr("class", d => "node" + (d.depth === 0 ? " root" : ""))
    .attr("transform", d => `translate(${source.y0},${source.x0})`)
    .on("click", clicked);

  nodeEnter.append("circle")
    .attr("r", 1e-6)
    .attr("fill", d => colors[d.data.category] || "#999")
    .attr("stroke", "#0a2540");

  nodeEnter.append("text")
    .attr("dy", "0.32em")
    .attr("x", d => d.children || d._children ? -14 : 14)
    .attr("text-anchor", d => d.children || d._children ? "end" : "start")
    .text(d => d.data.name)
    .style("fill-opacity", 1e-6);

  const nodeUpdate = node.merge(nodeEnter);

  nodeUpdate.transition().duration(300)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  nodeUpdate.select("circle")
    .attr("r", d => d.depth === 0 ? 12 : (d.data.category === "detail" ? 7 : 9))
    .attr("fill", d => colors[d.data.category] || "#999")
    .style("stroke", d => (d._children && !d.children) ? "#ffffff" : "#0a2540");

  nodeUpdate.select("text")
    .style("fill-opacity", 1)
    .attr("x", d => d.children || d._children ? -14 : 14)
    .attr("text-anchor", d => d.children || d._children ? "end" : "start");

  const nodeExit = node.exit().transition().duration(300)
    .attr("transform", d => `translate(${source.y},${source.x})`)
    .remove();

  nodeExit.select("circle").attr("r", 1e-6);
  nodeExit.select("text").style("fill-opacity", 1e-6);

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

function diagonal(s, t) {
  return `M ${s.y} ${s.x}
          C ${(s.y + t.y) / 2} ${s.x},
            ${(s.y + t.y) / 2} ${t.x},
            ${t.y} ${t.x}`;
}

function clicked(event, d) {
  // detail node -> open side panel, don't toggle
  if (d.data.category === "detail" && d.data.details) {
    showPanel(d);
    g.selectAll("g.node").classed("selected", n => n === d);
    return;
  }
  // otherwise toggle children
  if (d.children) {
    d._children = d.children;
    d.children = null;
  } else if (d._children) {
    d.children = d._children;
    d._children = null;
  }
  update(d);
}

function showPanel(d) {
  const det = d.data.details;
  const cat = d.parent ? d.parent.data.name : "";
  let html = `<div class="tag">${cat}</div><h2>${d.data.name}</h2>`;

  if (det.pricing && det.pricing.length) {
    html += `<h3>💰 Pricing Model</h3><ul>${det.pricing.map(x => `<li>${x}</li>`).join("")}</ul>`;
  }
  if (det.revenue && det.revenue.length) {
    html += `<h3>📈 Revenue / Scale</h3><ul>${det.revenue.map(x => `<li>${x}</li>`).join("")}</ul>`;
  }
  if (det.challenges && det.challenges.length) {
    html += `<h3>⚠️ Challenges / Talking Points</h3><ul>${det.challenges.map(x => `<li>${x}</li>`).join("")}</ul>`;
  }

  document.getElementById("panel-content").innerHTML = html;
  document.getElementById("panel").classList.add("open");
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
  g.selectAll("g.node").classed("selected", false);
}

function resetView() {
  svg.transition().duration(400).call(
    zoom.transform,
    d3.zoomIdentity.translate(80, height / 2).scale(0.85)
  );
}

function expandAll() {
  root.each(d => {
    if (d._children) { d.children = d._children; d._children = null; }
  });
  update(root);
}

function collapseAll() {
  root.children.forEach(child => {
    if (child.children) {
      child._children = child.children;
      child.children.forEach(c => {
        if (c.children) { c._children = c.children; c.children = null; }
      });
      child.children = child._children;
    }
  });
  // re-collapse depth-1 nodes too, leaving only root expanded
  root.children.forEach(child => {
    if (child.children) { child._children = child.children; child.children = null; }
  });
  update(root);
}

update(root);
resetView();

window.addEventListener("resize", () => {
  width = container.clientWidth;
  height = container.clientHeight;
});
</script>
</body>
</html>
